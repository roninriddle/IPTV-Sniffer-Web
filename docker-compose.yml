services:
  iptv-sniffer-web:
    build: .
    image: iptv-sniffer-web:0.7.1
    container_name: iptv-sniffer-web
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: Asia/Shanghai
      DATA_DIR: /app/data
      OUTPUT_DIR: /app/output
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8787
      RTP2HTTPD_PORT: 5140
      CAPTURE_SECONDS: 30
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
