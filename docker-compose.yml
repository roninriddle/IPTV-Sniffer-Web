services:
  iptv-sniffer-web:
    build: .
    image: roninriddle/iptv-sniffer-web:1.0.1
    container_name: iptv-sniffer-web
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: Asia/Shanghai
      DATA_DIR: /app/data
      OUTPUT_DIR: /app/output
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8787
      RTP2HTTPD_PORT: 5140
      # 可选：挂载 rtp2httpd 配置后填写路径，播放诊断会读取 upstream-interface / external-m3u。
      # RTP2HTTPD_CONFIG_PATH: /host/vol1/@appconf/rtp2httpd/rtp2httpd.conf
      CAPTURE_SECONDS: 30
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      # 如需播放诊断读取 rtp2httpd 配置，可按实际路径挂载为只读。
      # - /vol1/@appconf/rtp2httpd/rtp2httpd.conf:/host/vol1/@appconf/rtp2httpd/rtp2httpd.conf:ro
    restart: unless-stopped
