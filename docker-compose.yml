services:
  iptv-sniffer-web:
    build: .
    image: iptv-sniffer-web:v0.9.6
    container_name: iptv-sniffer-web
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: Asia/Shanghai
      DATA_DIR: /app/data
      OUTPUT_DIR: /app/output
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8787
      RTP2HTTPD_PORT: 5140
      CAPTURE_SECONDS: 30
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      # iStoreOS/OpenWrt 部署向导：挂载宿主机网络配置（只读）
      # - /etc/config/network:/host/etc/config/network:ro
    restart: unless-stopped
